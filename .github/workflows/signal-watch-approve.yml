name: Signal Watch Approve (On Close)

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: write

jobs:
  approve:
    if: contains(github.event.issue.labels.*.name, 'signal-watch-pending')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run approval publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/approve.py
